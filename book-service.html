<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - Maansingh Care</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Maansingh Care</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="booking-form-section">
        <div class="container">
            <h1>Book a Service</h1>
            <form id="bookingForm" class="booking-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required>
                </div>

                <div class="form-group">
                    <label for="service">Service Type *</label>
                    <select id="service" name="service" required>
                        <option value="">Select Service</option>
                        <option value="elderly">Elderly Care</option>
                        <option value="nursing">Home Nursing</option>
                        <option value="patient">Patient Care</option>
                        <option value="baby">Baby Care</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="duration">Duration *</label>
                    <select id="duration" name="duration" required>
                        <option value="">Select Duration</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Full Address *</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Submit Booking</button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Maansingh Care Services. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                service: document.getElementById('service').value,
                duration: document.getElementById('duration').value,
                address: document.getElementById('address').value
            };

            // Create WhatsApp message
            const message = `New Service Booking:%0A
Name: ${formData.name}%0A
Phone: ${formData.phone}%0A
City: ${formData.city}%0A
Service: ${formData.service}%0A
Duration: ${formData.duration}%0A
Address: ${formData.address}`;

            // WhatsApp URL
            const whatsappURL = `https://wa.me/919887098988?text=${message}`;

            // Show success message
            document.getElementById('formMessage').innerHTML = 
                'Thank you for choosing Maansingh Care Services, hum jaldi connect karenge';

            // Redirect to WhatsApp after 2 seconds
            setTimeout(() => {
                window.open(whatsappURL, '_blank');
            }, 2000);
        });
    </script>
</body>
</html>
