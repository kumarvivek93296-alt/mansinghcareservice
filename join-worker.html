<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as Worker - Maansingh Care</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Maansingh Care</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="worker-form-section">
        <div class="container">
            <h1>Join Our Team</h1>
            <p class="subtitle">Be a part of Maansingh Care Services family</p>
            
            <form id="workerForm" class="worker-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required>
                </div>

                <div class="form-group">
                    <label for="experience">Experience (in years) *</label>
                    <input type="number" id="experience" name="experience" required>
                </div>

                <div class="form-group">
                    <label for="idproof">ID Proof Type *</label>
                    <select id="idproof" name="idproof" required>
                        <option value="">Select ID Proof</option>
                        <option value="aadhar">Aadhar Card</option>
                        <option value="voter">Voter ID</option>
                        <option value="driving">Driving License</option>
                        <option value="passport">Passport</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="idnumber">ID Proof Number *</label>
                    <input type="text" id="idnumber" name="idnumber" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Apply Now</button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Maansingh Care Services. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('workerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('formMessage').innerHTML = 
                'Application submitted successfully! We will contact you soon.';
            this.reset();
        });
    </script>
</body>
</html>
